# Docker Compose for Prometheus Stack
# Story 10.2: 监控告警增强 (Monitoring Alert Enhancement)
#
# Usage:
#   cd backend/deployment/prometheus
#   docker-compose up -d

version: '3.8'

services:
  # Prometheus Server
  prometheus:
    image: prom/prometheus:latest
    container_name: idol_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - idol-monitoring

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: idol_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - idol-monitoring

  # Grafana (optional, for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: idol_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this!
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - idol-monitoring

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  idol-monitoring:
    driver: bridge
